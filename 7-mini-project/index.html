<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
</head>

<body>
    <div id="container">
        <h1>Register</h1>
        <div>
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                    <small class="error-message"></small>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <small class="error-message"></small>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <ul class="password-requirements">
                        <li><small id="req-length">Minimum 10 characters</small></li>
                        <li><small id="req-uppercase">Must include an uppercase letter</small>
                        </li>
                        <li><small id="req-number">Must include a number</small></li>
                        <li><small id="req-special">Must include a special character</small></li>
                    </ul>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                    <small class="error-message"></small>
                </div>
                <button type="submit" id="submit-btn">Register</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
