<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLOR PALLETE GENERATOR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <div id="color-header">
            <h2>Color Pallete Generator</h2>
            <button id="generate-btn"><i class="fa-solid fa-rotate" style="margin-right: 0.2rem;"></i>Generate
                Palette</button>
        </div>
        <div class="palette-container">

            <!-- COLOR BOX 1 -->
            <div class="color-box">
                <div class="color 1"></div>
                <div class="color-info">
                    <span class="hex-value">#7CFC00</span>
                    <i class="fa-solid fa-copy" style="color: rgb(97, 118, 141); font-size: 12px;"
                        title="Copy to clipboard"></i>
                </div>
            </div>

            <!-- COLOR BOX 2 -->
            <div class="color-box">
                <div class="color 2"></div>
                <div class="color-info">
                    <span class="hex-value">#7CFC00</span>
                    <i class="fa-solid fa-copy" style="color: rgb(97, 118, 141); font-size: 12px;"
                        title="Copy to clipboard"></i>
                </div>
            </div>

            <!-- COLOR BOX 3 -->
            <div class="color-box">
                <div class="color 3"></div>
                <div class="color-info">
                    <span class="hex-value">#7CFC00</span>
                    <i class="fa-solid fa-copy" style="color: rgb(97, 118, 141); font-size: 12px;"
                        title="Copy to clipboard"></i>
                </div>
            </div>

            <!-- COLOR BOX 4 -->
            <div class="color-box">
                <div class="color 4"></div>
                <div class="color-info">
                    <span class="hex-value">#7CFC00</span>
                    <i class="fa-solid fa-copy" style="color: rgb(97, 118, 141); font-size: 12px;"
                        title="Copy to clipboard"></i>
                </div>
            </div>

            <!-- COLOR BOX 5 -->
            <div class="color-box">
                <div class="color 5"></div>
                <div class="color-info">
                    <span class="hex-value">#7CFC00</span>
                    <i class="fa-solid fa-copy" style="color: rgb(97, 118, 141); font-size: 12px;"
                        title="Copy to clipboard"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
