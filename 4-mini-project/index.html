<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="container">
        <h1 id="project-title">Expense Tracker</h1>

        <div id="balance-container">
            <div id="balance-info">
                <h2>Your Balance</h2>
                <h1 id="balance-value">$0.00</h1>
            </div>

            <div id="summary">
                <div id="income-box">
                    <h3>Income</h3>
                    <p id="income-value"></p>
                </div>
                <div id="expense-box">
                    <h3>Expenses</h3>
                    <p id="expense-value"></p>
                </div>
            </div>
        </div>

        <div id="main-container">
            <div id="transactions-display">
                <h2>Transactions</h2>

                <div id="transaction-lists">
                    <!-- TRANSACTION CARD HERE -->
                </div>


            </div>

            <div id="transaction-container">
                <h2>Add Transaction</h2>

                <div class="transaction-box">
                    <h3>Description</h3>
                    <input type="text" placeholder="Enter description" id="description-input" class="input-box">
                </div>

                <div class="transaction-box">
                    <h3>Amount</h3>
                    <input type="text" placeholder="Enter amount" id="amount-input" class="input-box">
                    <p>Use negative (-) for expenses</p>
                </div>

                <button id="add-button">Add Transaction</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
