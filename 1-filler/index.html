<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">

        <div id="to-do">
            <div id="title-header">
                <h1>To-Do List <span>📝</span></h1>
            </div>

            <div id="add-task">
                <input type="text" id="text-field" placeholder="Add your task">
                <button id="add-list">Add</button>
            </div>

            <div id="add-tasks">

                <ul style="list-style: none;" class="list" id="list-items">
                    <!--List items goes here-->
                </ul>

            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
